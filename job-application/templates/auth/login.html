{% extends "layout.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

<div class="split-screen-wrapper">

    <div class="login-left">
        <div class="login-box">
            <h2>Login</h2>

            <form method="POST">

                <div class="input-group">
                    <input type="email" name="email" id="email-input" placeholder="Email" required>
                    <label for="email-input"><i class="fa-solid fa-at"></i></label>
                </div>

                <div class="input-group">
                    <input type="password" name="password" id="password-input" placeholder="Password" required>
                    <label for="password-input"><i class="fas fa-lock"></i></label>
                </div>
                
                <button type="submit" class="login-submit-btn">Login</button>

            </form>
        </div>
    </div>

    <div class="login-right">
        <div class="info-content">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" 
                 alt="Portal Logo" 
                 class="side-img">

            <h3>When Opportunity Meets the Right Job</h3>
            <p>Connect with top employers, discover your dream career, and take the next step in your professional journey. Your future starts here.</p>
        </div>
    </div>

</div>

{% endblock %}
