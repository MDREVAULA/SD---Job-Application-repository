{% extends "layout.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

<div class="split-screen-wrapper">

    <div class="login-left">
        <div class="login-box">
            <h2>Login</h2>

            <form method="POST">

                <div class="input-group">
                    <input type="email" name="email" id="email-input" placeholder="Email" required>
                    <label for="email-input"><i class="fa-solid fa-at"></i></label>
                </div>

                <div class="input-group">
                    <input type="password" name="password" id="password-input" placeholder="Password" required>
                    <label for="password-input"><i class="fas fa-lock"></i></label>
                </div>

                <button type="submit" class="login-submit-btn">Login</button>

            </form>

            <p style="text-align:center; margin-top: 10px;">
                <a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
            </p>

            <div style="text-align:center; margin: 16px 0; color: #aaa;">or</div>

            <a href="{{ url_for('auth.google_login') }}" style="
                display: block;
                text-align: center;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 6px;
                text-decoration: none;
                color: #444;
                font-weight: 500;
                background: #fff;
            ">
                <img src="https://developers.google.com/identity/images/g-logo.png"
                     style="width:18px; vertical-align:middle; margin-right:8px;">
                Sign in with Google
            </a>

        </div>
    </div>

    <div class="login-right">
        <div class="info-content">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                 alt="Portal Logo"
                 class="side-img">
            <h3>When Opportunity Meets the Right Job</h3>
            <p>Connect with top employers, discover your dream career, and take the next step in your professional journey. Your future starts here.</p>
        </div>
    </div>

</div>

{% endblock %}
