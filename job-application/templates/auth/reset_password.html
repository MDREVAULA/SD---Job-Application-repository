{% extends "layout.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/auth/login.css') }}">

<div class="split-screen-wrapper">
    <div class="login-left">
        <div class="login-box">
            <h2>Reset Password</h2>
            <p style="color:#888; font-size:14px; margin-bottom:16px;">
                Enter your new password below.
            </p>

            <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="input-group">
                    <input type="password" name="password" id="password-input"
                           placeholder="New password" required minlength="8">
                    <label for="password-input"><i class="fas fa-lock"></i></label>
                </div>

                <button type="submit" class="login-submit-btn">Reset Password</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
