{% extends "layout.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/auth/login.css') }}">

<div class="split-screen-wrapper">
    <div class="login-left">
        <div class="login-box">
            <h2>Forgot Password</h2>
            <p style="color:#888; font-size:14px; margin-bottom:16px;">
                Enter your email and we'll send you a reset link.
            </p>

            <form method="POST">
                <div class="input-group">
                    <input type="email" name="email" id="email-input" placeholder="Email" required>
                    <label for="email-input"><i class="fa-solid fa-at"></i></label>
                </div>

                <button type="submit" class="login-submit-btn">Send Reset Link</button>
            </form>

            <p style="text-align:center; margin-top:12px;">
                <a href="{{ url_for('auth.login') }}">Back to Login</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
