{% extends "layout.html" %}
{% block content %}

<h2>HR Accounts</h2>

<div class="card">

<h3>Create HR Account</h3>

<form method="POST" action="{{ url_for('recruiter.create_hr') }}">

<label>HR Name</label>
<input type="text" name="username" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Temporary Password</label>
<input type="text" name="password" required>

<button type="submit" class="btn-primary">
Create HR
</button>

</form>

</div>


<div class="card">

<h3>HR List</h3>

<ul class="hr-list">

{% for hr in hrs %}

<li>
<i class="fa-solid fa-user"></i>
<span>{{ hr.username }}</span>
<small>{{ hr.email }}</small>
</li>

{% endfor %}

</ul>

</div>

{% endblock %}
