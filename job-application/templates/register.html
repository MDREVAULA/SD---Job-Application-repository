{% extends "layout.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<h2>Register</h2>
<form method="POST" enctype="multipart/form-data">

    <label>Role:</label><br>
    <select name="role" id="role" required onchange="toggleRecruiterFields()">
        <option value="applicant">Applicant</option>
        <option value="recruiter">Recruiter</option>
    </select><br><br>

    <!-- Always visible fields -->
    <label>Username:</label><br>
    <input type="text" name="username" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Password:</label><br>
    <input type="password" name="password" required><br><br>

    <!-- Recruiter-only fields -->
    <div id="recruiter-fields" style="display:none;">
        <label>Last Name:</label><br>
        <input type="text" name="surname"><br><br>

        <label>First Name:</label><br>
        <input type="text" name="first_name"><br><br>

        <label>Middle Name:</label><br>
        <input type="text" name="middle_name"><br><br>

        <label>Phone Number:</label><br>
        <input type="text" name="phone_number"><br><br>

        <label>Company Name:</label><br>
        <input type="text" name="company_name"><br><br>

        <label>Company Industry:</label><br>
        <input type="text" name="company_industry"><br><br>

        <label>Company Description:</label><br>
        <textarea name="company_description"></textarea><br><br>

        <label>Company Address:</label><br>
        <input type="text" name="company_address"><br><br>

        <label>Country:</label><br>
        <input type="text" name="country"><br><br>

        <label>City:</label><br>
        <input type="text" name="city"><br><br>

        <label>Office Address:</label><br>
        <input type="text" name="office_address"><br><br>

        <label>Company Logo:</label><br>
        <input type="file" name="company_logo" accept="image/*"><br><br>

        <label>Company Email Domain:</label><br>
        <input type="text" name="company_email_domain"><br><br>

        <label>Proof of Company:</label><br>
        <input type="file" name="company_proof" accept=".pdf,.doc,.docx,.jpg,.png"><br><br>
    </div>

    <button type="submit">Register</button>
</form>

<script>
function toggleRecruiterFields() {
    const role = document.getElementById('role').value;
    const fields = document.getElementById('recruiter-fields');
    fields.style.display = role === 'recruiter' ? 'block' : 'none';
}
</script>
{% endblock %}
