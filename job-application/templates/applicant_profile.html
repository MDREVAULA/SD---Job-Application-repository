{% extends "layout.html" %}
{% block content %}
<h2>My Profile</h2>

<form method="POST" enctype="multipart/form-data" class="profile-form">

    <!-- Profile Picture Preview -->
    <div class="form-group">
        <label>Profile Picture:</label>
        <input type="file" name="profile_picture" accept=".png,.jpg,.jpeg" id="profilePictureInput">
        <img id="profilePreview" src="{{ url_for('static', filename='uploads/' ~ (profile.profile_picture or 'default.png')) }}" alt="Profile Picture" class="profile-pic">
    </div>

    <script>
    document.getElementById('profilePictureInput').addEventListener('change', function(e){
        const file = e.target.files[0];
        if(file){
            const reader = new FileReader();
            reader.onload = function(evt){
                document.getElementById('profilePreview').src = evt.target.result;
            }
            reader.readAsDataURL(file);
        }
    });
    </script>

    <!-- Text Fields -->
    <div class="form-group">
        <label>First Name:</label>
        <input type="text" name="first_name" value="{{ profile.first_name or '' }}">
    </div>
    <div class="form-group">
        <label>Last Name:</label>
        <input type="text" name="last_name" value="{{ profile.last_name or '' }}">
    </div>
    <div class="form-group">
        <label>Middle Name:</label>
        <input type="text" name="middle_name" value="{{ profile.middle_name or '' }}">
    </div>
    <div class="form-group">
        <label>Date of Birth:</label>
        <input type="date" name="date_of_birth" value="{{ profile.date_of_birth.strftime('%Y-%m-%d') if profile.date_of_birth else '' }}">
    </div>
    <div class="form-group">
        <label>Gender:</label>
        <select name="gender">
            <option value="">Select Gender</option>
            <option value="Male" {% if profile.gender == 'Male' %}selected{% endif %}>Male</option>
            <option value="Female" {% if profile.gender == 'Female' %}selected{% endif %}>Female</option>
            <option value="Other" {% if profile.gender == 'Other' %}selected{% endif %}>Other</option>
        </select>
    </div>
    <div class="form-group">
        <label>Phone Number:</label>
        <input type="text" name="phone_number" value="{{ profile.phone_number or '' }}">
    </div>
    <div class="form-group">
        <label>Country:</label>
        <input type="text" name="country" value="{{ profile.country or '' }}">
    </div>
    <div class="form-group">
        <label>City:</label>
        <input type="text" name="city" value="{{ profile.city or '' }}">
    </div>
    <div class="form-group">
        <label>Home Address:</label>
        <input type="text" name="home_address" value="{{ profile.home_address or '' }}">
    </div>

    <button type="submit" class="btn">Update Profile</button>
</form>
{% endblock %}
